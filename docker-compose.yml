
services:
  # ==================== Backend Server ====================
  server:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    container_name: pm_server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      URL_REACT: http://localhost:5173
      DB_HOST: host.docker.internal
      DB_USER: root
      DB_PASS: ""
      DB_NAME: project_manager
      DB_PORT: 3306
      JWT_SECRET: phanthanhthang
      JWT_REFRESH_SECRET: phanthanhthang
      EMAIL_USER: thangphanthanh81@gmail.com
      EMAIL_PASS: "xkss pfcj zkpw sfxy"
      CLOUDINARY_CLOUD_NAME: dos3deq65
      CLOUDINARY_API_KEY: "287621431518168"
      CLOUDINARY_API_SECRET: DOr8t0SKRCBkk4nnZHs5Tgh4Zaw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pm_network

  # ==================== Frontend Client ====================
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: pm_client
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api/v1
    volumes:
      - ./client/app:/app/app
      - ./client/public:/app/public
    depends_on:
      - server
    networks:
      - pm_network

networks:
  pm_network:
    driver: bridge
